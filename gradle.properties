# Gradle JVM memory configuration
# Allocates 4GB heap and 1GB metaspace for Gradle daemon
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8

# Android configuration
# Use AndroidX libraries instead of legacy support libraries
android.useAndroidX=true

# Non-transitive R class - reduces build time and APK size
android.nonTransitiveRClass=true

# Kotlin code style
kotlin.code.style=official

# Suppress unsupported compile SDK warning
android.suppressUnsupportedCompileSdk=34
